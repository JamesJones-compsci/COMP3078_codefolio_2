version: "3.9"

services:
  # ===========================
  # CodeFolio Web App
  # ===========================
  app:
    container_name: codefolio_app
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "5000:8080"
    volumes:
      - data-protection:/root/.aspnet/DataProtection-Keys
      - app-storage:/app/storage
    networks:
      - codefolio_net
    restart: unless-stopped

  # ===========================
  # Reverse Proxy with Caddy
  # ===========================
  reverse-proxy:
    image: caddy:2
    container_name: codefolio_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - app
    networks:
      - codefolio_net
    restart: unless-stopped

# ===========================
# Named Volumes
# ===========================
volumes:
  data-protection:
  app-storage:
  caddy_data:
  caddy_config:

# ===========================
# Network
# ===========================
networks:
  codefolio_net:
    driver: bridge